<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Science Olympiad Sidebar</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 10px;
        background-color: #f7f7f7;
      }
      .tab-container {
        display: flex;
        justify-content: space-around;
        background-color: #4a90e2;
        padding: 10px;
        border-radius: 8px;
      }
      .tab {
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 5px;
        font-weight: bold;
        background-color: #f1f1f1;
        color: #4a90e2;
        border: none;
        transition: background 0.2s;
      }
      .tab.active {
        background-color: #4a90e2;
        color: white;
      }
      .content {
        display: none;
        background-color: white;
        padding: 15px;
        border-radius: 5px;
        margin-top: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      .content.active {
        display: block;
      }
      button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        background-color: #2ecc71;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        font-size: 14px;
      }
      button:hover {
        background-color: #27ae60;
      }
      #logsBox {
        background-color: white;
        color: black;
        padding: 15px;
        border-radius: 5px;
        max-height: 250px;
        overflow-y: auto;
        font-size: 14px;
        white-space: pre-wrap;
      }
      .clear-btn {
        background-color: #d9534f;
      }
      .clear-btn:hover {
        background-color: #c9302c;
      }
      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
      }
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 60px;
        height: 24px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        -webkit-transition: 0.4s;
        transition: 0.4s;
        border-radius: 24px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        -webkit-transition: 0.4s;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #4a90e2;
      }
      input:focus + .slider {
        box-shadow: 0 0 1px #4a90e2;
      }
      input:checked + .slider:before {
        -webkit-transform: translateX(30px);
        -ms-transform: translateX(30px);
        transform: translateX(30px);
      }
      .toggle-label {
        font-size: 14px;
        margin-right: 10px;
        line-height: 24px;
      }
      .info-container {
        background-color: white;
        padding: 15px;
        border-radius: 5px;
        margin-top: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .info-row {
        display: flex;
        flex-direction: column;
        margin: 15px 0;
        padding: 8px;
        border-bottom: 1px solid #eee;
      }
      .info-header {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
      }
      .status-icon {
        margin-right: 10px;
        font-size: 18px;
        width: 20px;
        text-align: center;
      }
      .status-icon.error {
        color: #d9534f;
      }
      .status-icon.success {
        color: #2ecc71;
      }
      .info-label {
        font-weight: bold;
        color: #4a90e2;
      }
      .info-value {
        padding-left: 30px; /* Aligns with content after the icon */
        word-break: break-word;
        font-size: 14px;
      }
      .info-value a {
        color: #4a90e2;
        text-decoration: none;
      }
      .info-value a:hover {
        text-decoration: underline;
      }
      .setup-link {
        color: #4a90e2;
        text-decoration: none;
        margin-left: 8px;
        font-style: normal;
        font-size: 12px;
        padding: 2px 6px;
        border: 1px solid #4a90e2;
        border-radius: 3px;
      }
      .setup-link:hover {
        background-color: #4a90e2;
        color: white;
      }
      .not-populated {
        display: flex;
        align-items: center;
        gap: 8px;
      }
    </style>
  </head>
  <body onbeforeunload="sidebarClosed()">
    <div class="tab-container">
      <button class="tab active" onclick="switchTab('welcome')">Welcome</button>
      <button class="tab" onclick="switchTab('tournament')">
        Tournament Functions
      </button>
      <button class="tab" onclick="switchTab('logs')">Logs</button>
    </div>

    <div class="content active" id="welcome">
      <h3>Tournament Information</h3>
      <div id="tournamentInfo">
        <div class="info-container">
          <!-- Tournament info will be populated here -->
        </div>
      </div>
    </div>

    <div class="content" id="tournament">
      <h3>Tournament Functions</h3>
      <button onclick="runTournamentFunction('tournamentSetup')">
        1. Setup Tournament
      </button>
      <button onclick="runTournamentFunction('createEventTabs')">
        2. Create Only Event Tabs
      </button>
      <button onclick="runTournamentFunction('createEventSpreadsheets')">
        3. Create Event Spreadsheets
      </button>
      <button onclick="runTournamentFunction('createGradingScoresheets')">
        4. Create Grading Scoresheets
      </button>
      <button onclick="runTournamentFunction('shareScoringFoldersWithEmails')">
        5. Share Scoring Folder
      </button>
      <button onclick="runTournamentFunction('createOneSlidePerRow')">
        6. Create Slides Presentation
      </button>
    </div>

    <div class="content" id="logs">
      <h3>Logs</h3>
      <div id="logsBox">Loading logs...</div>
      <button class="clear-btn" onclick="clearLogMessages()">Clear Logs</button>
      <div class="toggle-container">
        <span class="toggle-label" id="debugStatus">DEBUG Mode Off</span>
        <label class="toggle-switch">
          <input
            type="checkbox"
            id="debugToggle"
            onchange="toggleDebugMode()"
          />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <script>
      let lastLogCount = 0; // To track log changes

      function switchTab(tabId) {
        document
          .querySelectorAll(".content")
          .forEach((el) => el.classList.remove("active"));
        document
          .querySelectorAll(".tab")
          .forEach((el) => el.classList.remove("active"));

        document.getElementById(tabId).classList.add("active");
        document
          .querySelector(`button[onclick="switchTab('${tabId}')"]`)
          .classList.add("active");
      }

      function updateLogBox(logs) {
        const logBox = document.getElementById("logsBox");
        logBox.textContent = logs || "No logs available.";

        // Auto-switch to logs tab if new entries appear
        const logCount = (logs.match(/\n/g) || []).length;
        if (logCount > lastLogCount) {
          switchTab("logs"); // Auto-switch to logs tab
        }
        lastLogCount = logCount;

        // Auto-scroll to bottom
        setTimeout(() => {
          logBox.scrollTop = logBox.scrollHeight;
        }, 100); // Small delay to ensure content updates before scrolling
      }

      function fetchLogs() {
        google.script.run.withSuccessHandler(updateLogBox).getLogs();
      }

      function clearLogMessages() {
        google.script.run.withSuccessHandler(updateLogBox).clearLogs();
      }

      function runTournamentFunction(functionName) {
        google.script.run.withSuccessHandler(fetchLogs)[functionName]();
      }

      function toggleDebugMode() {
        const debugToggle = document.getElementById("debugToggle");
        const debugStatus = document.getElementById("debugStatus");
        google.script.run
          .withSuccessHandler(function (isDebugMode) {
            debugStatus.textContent = isDebugMode
              ? "DEBUG Mode On"
              : "DEBUG Mode Off";
          })
          .toggleDebugMode(debugToggle.checked);
      }

      window.onload = function () {
        fetchLogs();
        setInterval(fetchLogs, 2000);
        google.script.run
          .withSuccessHandler(updateTournamentInfo)
          .getTournamentInfo();

        // Initialize the debug toggle based on current debug mode
        google.script.run
          .withSuccessHandler(function (isDebugMode) {
            const debugToggle = document.getElementById("debugToggle");
            const debugStatus = document.getElementById("debugStatus");
            debugToggle.checked = isDebugMode;
            debugStatus.textContent = isDebugMode
              ? "DEBUG Mode On"
              : "DEBUG Mode Off";
          })
          .isDebugMode();

        // Keep sidebar status updated
        window.setInterval(function () {
          google.script.run.openSidebar();
          google.script.run
            .withSuccessHandler(updateTournamentInfo)
            .getTournamentInfo();
        }, 10000);
      };

      function updateTournamentInfo(info) {
        const container = document.querySelector(
          "#tournamentInfo .info-container",
        );
        if (!container) return;

        const infoHTML = info
          .map(
            (item) => `
            <div class="info-row">
                <div class="info-header">
                    <span class="status-icon ${item.populated ? "success" : "error"}">
                        ${item.populated ? "✓" : "✗"}
                    </span>
                    <span class="info-label">${item.label}</span>
                </div>
                <div class="info-value">
                    ${
                      item.populated
                        ? item.isLink
                          ? `<a href="${item.value}" target="_blank">${item.label}</a>`
                          : item.value
                        : `<span class="not-populated">Not populated yet 
                            <a href="#" onclick="setupField('${item.label}'); return false;" 
                               class="setup-link">Setup</a>
                         </span>`
                    }
                </div>
            </div>
        `,
          )
          .join("");

        container.innerHTML = infoHTML;
      }

      function setupField(field) {
        google.script.run
          .withSuccessHandler(function () {
            // Refresh the tournament info after setup
            google.script.run
              .withSuccessHandler(updateTournamentInfo)
              .getTournamentInfo();
          })
          .promptForMissingInfo(field);
      }
    </script>
  </body>
</html>
