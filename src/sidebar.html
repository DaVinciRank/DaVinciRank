<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Science Olympiad Sidebar</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 10px;
        background-color: #f7f7f7;
      }

      .tab-container {
        display: flex;
        justify-content: space-around;
        background-color: #4a90e2;
        padding: 10px;
        border-radius: 8px;
      }

      .tab {
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 5px;
        font-weight: bold;
        background-color: #f1f1f1;
        color: #4a90e2;
        border: none;
        transition: background 0.2s;
      }

      .tab.active {
        background-color: #4a90e2;
        color: white;
      }

      .content {
        display: none;
        background-color: white;
        padding: 15px;
        border-radius: 5px;
        margin-top: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      .content.active {
        display: block;
      }

      button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        background-color: #2ecc71;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        font-size: 14px;
      }

      button:hover {
        background-color: #27ae60;
      }

      #logsBox {
        background-color: white;
        color: black;
        padding: 15px;
        border-radius: 5px;
        max-height: 250px;
        overflow-y: auto;
        font-size: 14px;
        white-space: pre-wrap;
      }

      .clear-btn {
        background-color: #d9534f;
      }

      .clear-btn:hover {
        background-color: #c9302c;
      }

      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
      }

      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 60px;
        height: 24px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        -webkit-transition: 0.4s;
        transition: 0.4s;
        border-radius: 24px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        -webkit-transition: 0.4s;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #4a90e2;
      }

      input:focus + .slider {
        box-shadow: 0 0 1px #4a90e2;
      }

      input:checked + .slider:before {
        -webkit-transform: translateX(30px);
        -ms-transform: translateX(30px);
        transform: translateX(30px);
      }

      .toggle-label {
        font-size: 14px;
        margin-right: 10px;
        line-height: 24px;
      }

      .info-container {
        background-color: white;
        padding: 15px;
        border-radius: 5px;
        margin-top: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .info-row {
        display: flex;
        flex-direction: column;
        margin: 15px 0;
        padding: 8px;
        border-bottom: 1px solid #eee;
      }

      .info-header {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
      }

      .status-icon {
        margin-right: 10px;
        font-size: 18px;
        width: 20px;
        text-align: center;
      }

      .status-icon.error {
        color: #d9534f;
      }

      .status-icon.success {
        color: #2ecc71;
      }

      .info-label {
        font-weight: bold;
        color: #4a90e2;
      }

      .info-value {
        padding-left: 30px;
        word-break: break-word;
        font-size: 14px;
      }

      .info-value a {
        color: #4a90e2;
        text-decoration: none;
      }

      .info-value a:hover {
        text-decoration: underline;
      }

      .setup-link {
        color: #4a90e2;
        text-decoration: none;
        margin-left: 8px;
        font-style: normal;
        font-size: 12px;
        padding: 2px 6px;
        border: 1px solid #4a90e2;
        border-radius: 3px;
      }

      .setup-link:hover {
        background-color: #4a90e2;
        color: white;
      }

      .not-populated {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .view-button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background-color: #4a90e2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      .view-button:hover {
        background-color: #357abd;
      }

      .header-with-back {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }

      .events-container {
        max-height: 600px;
        overflow-y: auto;
        padding: 0;
        background-color: white;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .event-name {
        flex: 1;
      }

      .header-section {
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
      }

      .header-section h3 {
        margin: 0 0 10px 0;
      }

      .back-button {
        background-color: transparent;
        border: none;
        color: #4a90e2;
        font-size: 14px;
        cursor: pointer;
        padding: 5px 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
        width: auto;
        margin: 0 auto;
      }

      .events-container {
        max-height: calc(100vh - 150px); /* Adjust for header and margins */
        overflow-y: auto;
        padding: 0;
        background-color: white;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      #events-view {
        max-height: calc(100vh - 150px); /* Match container height */
        overflow: hidden;
      }

      .back-button:hover {
        color: #357abd;
        transform: translateX(-3px);
      }

      .back-arrow {
        margin-right: 5px;
      }

      .event-item {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background-color 0.2s ease;
      }

      .event-item:hover {
        background-color: #f8f9fa;
      }

      .event-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-right: 10px;
      }

      .event-link {
        color: #4a90e2;
        text-decoration: none;
        padding: 4px 12px;
        border: 1px solid #4a90e2;
        border-radius: 3px;
        font-size: 13px;
        white-space: nowrap;
        transition: all 0.2s ease;
      }

      .event-link:hover {
        background-color: #4a90e2;
        color: white;
        text-decoration: none;
      }

      .no-file {
        color: #999;
        font-style: italic;
        font-size: 13px;
      }

      /* Animation classes */
      .slide-in {
        animation: slideIn 0.3s ease-out;
      }

      .slide-out {
        animation: slideOut 0.3s ease-out;
      }

      .finalize-action {
        margin-left: auto;
      }

      .finalize-btn {
        width: auto !important;
        padding: 4px 8px;
        font-size: 12px;
        margin: 0;
        background-color: #2ecc71;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .status-icon.success {
        font-size: 18px;
        color: #2ecc71;
      }

      .tournament-tab {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 150px);
        overflow: hidden;
      }

      .check-off-events-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 0;
        background-color: white;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }

        to {
          opacity: 0;
          transform: translateX(-30px);
        }
      }
    </style>
  </head>

  <body onbeforeunload="sidebarClosed()">
    <div class="tab-container">
      <button class="tab active" onclick="switchTab('welcome')">Welcome</button>
      <button class="tab" onclick="switchTab('tournament')">
        Tournament Functions
      </button>
      <button class="tab" onclick="switchTab('logs')">Logs</button>
    </div>

    <div class="content active" id="welcome">
      <h3>Tournament Information</h3>
      <div id="tournamentInfo">
        <div class="info-container">
          <!-- Tournament info will be populated here -->
        </div>
      </div>
      <button class="view-button" onclick="showEventView()">
        Show Event Scoring Files
      </button>
    </div>

    <div class="content" id="events-view" style="display: none">
      <div class="header-section">
        <h3>Event Scoring Files</h3>
        <button class="back-button" onclick="showWelcomeView()">
          <span class="back-arrow">←</span> Back
        </button>
      </div>
      <div id="eventsList" class="events-container">
        <!-- Events will be populated here -->
      </div>
    </div>

    <div class="content" id="tournament">
      <h3>Tournament Functions</h3>
      <button onclick="runTournamentFunction('tournamentSetup')">
        1. Setup Tournament
      </button>
      <button onclick="runTournamentFunction('createEventTabs')">
        2. Create Only Event Tabs
      </button>
      <button onclick="runTournamentFunction('createEventSpreadsheets')">
        3. Create Event Spreadsheets
      </button>
      <button onclick="runTournamentFunction('createGradingScoresheets')">
        4. Create Grading Scoresheets
      </button>
      <button onclick="runTournamentFunction('shareScoringFoldersWithEmails')">
        5. Share Scoring Folder
      </button>
      <button onclick="runTournamentFunction('createOneSlidePerRow')">
        6. Create Slides Presentation
      </button>

      <div style="margin: 15px 0"></div>

      <h3>Check off Events</h3>
      <div id="checkOffEventsList" class="check-off-events-container">
        <!-- The events list is rendered here -->
      </div>
    </div>

    <div class="content" id="logs">
      <h3>Logs</h3>
      <div id="logsBox">Loading logs...</div>
      <button class="clear-btn" onclick="clearLogMessages()">Clear Logs</button>
      <div class="toggle-container">
        <span class="toggle-label" id="debugStatus">DEBUG Mode Off</span>
        <label class="toggle-switch">
          <input
            type="checkbox"
            id="debugToggle"
            onchange="toggleDebugMode()"
          />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <script>
      let lastLogCount = 0; // To track log changes
      let lastWelcomeView = "welcome"; // Tracks which view we were in within the welcome tab

      function switchTab(tabId) {
        // Remove animation classes from welcome views before switching tabs
        document
          .getElementById("welcome")
          .classList.remove("slide-in", "slide-out");
        document
          .getElementById("events-view")
          .classList.remove("slide-in", "slide-out");

        // Hide all content divs
        document.querySelectorAll(".content").forEach((el) => {
          el.style.display = "none";
          el.classList.remove("active");
        });

        // Remove active class from all tabs
        document
          .querySelectorAll(".tab")
          .forEach((el) => el.classList.remove("active"));

        // Show and activate the selected tab
        if (tabId === "welcome") {
          // Show the last active welcome view without animation
          document.getElementById(lastWelcomeView).style.display = "block";
        } else {
          const selectedContent = document.getElementById(tabId);
          selectedContent.style.display = "block";
          selectedContent.classList.add("active");
        }

        // Activate the tab button
        document
          .querySelector(`button[onclick="switchTab('${tabId}')"]`)
          .classList.add("active");

        if (tabId === "tournament") {
          loadCheckOffEvents();
        }
      }

      function updateLogBox(logs) {
        const logBox = document.getElementById("logsBox");
        logBox.textContent = logs || "No logs available.";

        // Auto-switch to logs tab if new entries appear
        const logCount = (logs.match(/\n/g) || []).length;
        if (logCount > lastLogCount) {
          switchTab("logs"); // Auto-switch to logs tab
        }
        lastLogCount = logCount;

        // Auto-scroll to bottom
        setTimeout(() => {
          logBox.scrollTop = logBox.scrollHeight;
        }, 100); // Small delay to ensure content updates before scrolling
      }

      function fetchLogs() {
        google.script.run.withSuccessHandler(updateLogBox).getLogs();
      }

      function clearLogMessages() {
        google.script.run.withSuccessHandler(updateLogBox).clearLogs();
      }

      function runTournamentFunction(functionName) {
        google.script.run.withSuccessHandler(fetchLogs)[functionName]();
      }

      function toggleDebugMode() {
        const debugToggle = document.getElementById("debugToggle");
        const debugStatus = document.getElementById("debugStatus");
        google.script.run
          .withSuccessHandler(function (isDebugMode) {
            debugStatus.textContent = isDebugMode
              ? "DEBUG Mode On"
              : "DEBUG Mode Off";
          })
          .toggleDebugMode(debugToggle.checked);
      }

      window.onload = function () {
        fetchLogs();
        setInterval(fetchLogs, 2000);
        google.script.run
          .withSuccessHandler(updateTournamentInfo)
          .getTournamentInfo();

        // Initialize the debug toggle based on current debug mode
        google.script.run
          .withSuccessHandler(function (isDebugMode) {
            const debugToggle = document.getElementById("debugToggle");
            const debugStatus = document.getElementById("debugStatus");
            debugToggle.checked = isDebugMode;
            debugStatus.textContent = isDebugMode
              ? "DEBUG Mode On"
              : "DEBUG Mode Off";
          })
          .isDebugMode();

        // Keep sidebar status updated
        window.setInterval(function () {
          google.script.run.openSidebar();
          google.script.run
            .withSuccessHandler(updateTournamentInfo)
            .getTournamentInfo();
        }, 10000);
      };

      function updateTournamentInfo(info) {
        const container = document.querySelector(
          "#tournamentInfo .info-container",
        );
        if (!container) return;

        const infoHTML = info
          .map(
            (item) => `
                <div class="info-row">
                    <div class="info-header">
                        <span class="status-icon ${item.populated ? "success" : "error"}">
                            ${item.populated ? "✓" : "✗"}
                        </span>
                        <span class="info-label">${item.label}</span>
                    </div>
                    <div class="info-value">
                        ${
                          item.populated
                            ? item.isLink
                              ? `<a href="${item.value}" target="_blank">${item.label}</a>`
                              : item.value
                            : `<span class="not-populated">Not populated yet 
                                <a href="#" onclick="setupField('${item.label}'); return false;" 
                                class="setup-link">Setup</a>
                            </span>`
                        }
                    </div>
                </div>
            `,
          )
          .join("");

        container.innerHTML = infoHTML;
      }

      function setupField(field) {
        google.script.run
          .withSuccessHandler(function () {
            // Refresh the tournament info after setup
            google.script.run
              .withSuccessHandler(updateTournamentInfo)
              .getTournamentInfo();
          })
          .promptForMissingInfo(field);
      }

      function showEventView() {
        const welcomeView = document.getElementById("welcome");
        const eventsView = document.getElementById("events-view");

        // Remove any existing animation classes first
        welcomeView.classList.remove("slide-in", "slide-out");
        eventsView.classList.remove("slide-in", "slide-out");

        welcomeView.classList.add("slide-out");
        setTimeout(() => {
          welcomeView.style.display = "none";
          eventsView.style.display = "block";
          eventsView.classList.add("slide-in");
          loadEventsList();
        }, 200);
        lastWelcomeView = "events-view";
      }

      function showWelcomeView() {
        const welcomeView = document.getElementById("welcome");
        const eventsView = document.getElementById("events-view");

        // Remove any existing animation classes first
        welcomeView.classList.remove("slide-in", "slide-out");
        eventsView.classList.remove("slide-in", "slide-out");

        eventsView.classList.remove("slide-in");
        eventsView.classList.add("slide-out");
        setTimeout(() => {
          eventsView.style.display = "none";
          welcomeView.style.display = "block";
          welcomeView.classList.remove("slide-out");
          welcomeView.classList.add("slide-in");
        }, 200);
        lastWelcomeView = "welcome";
      }

      function loadEventsList() {
        google.script.run
          .withSuccessHandler(updateEventsList)
          .getEventScoringFiles();
      }

      function updateEventsList(events) {
        const container = document.getElementById("eventsList");
        if (!container) return;

        const eventsHTML = events
          .map(
            (event) => `
            <div class="event-item">
                <span class="event-name">${event.name}</span>
                ${
                  event.fileUrl
                    ? `<a href="${event.fileUrl}" target="_blank" class="event-link">Open</a>`
                    : '<span class="no-file">No file created</span>'
                }
            </div>
        `,
          )
          .join("");

        container.innerHTML = eventsHTML;
      }

      function loadCheckOffEvents() {
        google.script.run
          .withSuccessHandler(updateCheckOffEventsList)
          .getEventsForCheckOff();
      }

      function updateCheckOffEventsList(events) {
        const container = document.getElementById("checkOffEventsList");
        if (!container) return;

        const eventsHTML = events
          .map((event) => {
            return `
              <div class="event-item">
                <span class="event-name">${event.name}</span>
                ${
                  event.finalized
                    ? `<span class="status-icon success">✓</span>`
                    : `<button class="finalize-btn" onclick="confirmFinalize('${event.name}')">Finalize</button>`
                }
              </div>
            `;
          })
          .join("");

        container.innerHTML = eventsHTML;
      }

      function confirmFinalize(eventId) {
        if (confirm("Are you sure you want to finalize this event?")) {
          google.script.run
            .withSuccessHandler(loadCheckOffEvents)
            .finalizeEvent(eventId);
        }
      }
    </script>
  </body>
</html>
